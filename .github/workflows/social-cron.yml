name: Social Auto-Posting

# Löst die täglichen/wöchentlichen Auto-Posts aus, indem es die geschützten
# Endpunkte der Website aufruft. Zeiten sind UTC (GitHub kann keine Zeitzone):
#   - 03:00 UTC = 05:00 Europe/Berlin im Sommer (04:00 im Winter)
#   - 09:00 UTC = 11:00 Europe/Berlin im Sommer (10:00 im Winter)
# Der API-Key liegt als Repo-Secret MENU_API_KEY (wird in den Logs maskiert).
#
# WICHTIG (Lehre aus 24.–26.06.): Aufrufe per curl von GitHub-Runnern werden
# vom Hostinger-WAF mit leerem HTTP 400 abgewiesen (curl-TLS/IP). Deshalb läuft
# der Aufruf über PowerShell (Invoke-WebRequest, .NET-TLS – kommt durch).
# Das Skript wiederholt bei Wacklern und schlägt sonst WIRKLICH fehl (rot) →
# GitHub-Fehlermail statt stillem "success".

on:
  schedule:
    - cron: "0 3 * * 1-5" # Mo–Fr früh: heutiges Tagesgericht (Post + IG-Story)
    - cron: "0 9 * * 5" # Freitag: Menü der kommenden Woche
  workflow_dispatch:
    inputs:
      job:
        description: "Manuell auslösen: daily oder weekly"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken (für das Aufruf-Skript)
        uses: actions/checkout@v4

      - name: Tagesgericht posten (Mo–Fr)
        if: github.event.schedule == '0 3 * * 1-5' || (github.event_name == 'workflow_dispatch' && inputs.job == 'daily')
        shell: pwsh
        env:
          API_KEY: ${{ secrets.MENU_API_KEY }}
        run: |
          .github/scripts/call-cron.ps1 -Label "Tagesgericht" -Url "https://culinarium-berlin.de/api/cron/daily-post"

      - name: Wochenmenü posten (Freitag)
        if: github.event.schedule == '0 9 * * 5' || (github.event_name == 'workflow_dispatch' && inputs.job == 'weekly')
        shell: pwsh
        env:
          API_KEY: ${{ secrets.MENU_API_KEY }}
        run: |
          .github/scripts/call-cron.ps1 -Label "Wochenmenü-Post" -Url "https://culinarium-berlin.de/api/cron/weekly-post"

      - name: Wochenmenü per Mail an Verteiler (Freitag)
        if: github.event.schedule == '0 9 * * 5' || (github.event_name == 'workflow_dispatch' && inputs.job == 'weekly')
        shell: pwsh
        env:
          API_KEY: ${{ secrets.MENU_API_KEY }}
        run: |
          .github/scripts/call-cron.ps1 -Label "Wochenmenü-Mail" -Url "https://culinarium-berlin.de/api/cron/weekly-mail"
